name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build and Test

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore localgov-umbraco.sln

      - name: Build
        run: dotnet build localgov-umbraco.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test localgov-umbraco.sln --configuration Release --no-build --verbosity normal
