name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    name: Pack and Publish

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore localgov-umbraco.sln

      - name: Build
        run: dotnet build localgov-umbraco.sln --configuration Release --no-restore /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Test
        run: dotnet test localgov-umbraco.sln --configuration Release --no-build

      - name: Pack all packages
        run: |
          for proj in src/*/; do
            dotnet pack "$proj" --configuration Release --no-build --output ./nupkgs /p:Version=${{ steps.version.outputs.VERSION }}
          done
          dotnet pack meta/LocalGov.Umbraco/ --configuration Release --output ./nupkgs /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Publish to NuGet.org
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./nupkgs/*.nupkg
          generate_release_notes: true
